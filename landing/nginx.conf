server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression for text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types
    text/html
    text/css
    application/javascript
    application/json
    image/svg+xml;

  # Security headers (kept light for a static page)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=()" always;

  # Cache hashed/static assets for a year
  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Don't cache HTML so updates are seen immediately
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Short cache for root CSS/JS (no build pipeline to hash them; trade
  # 5-min cache for faster propagation of style changes).
  location ~* ^/(style\.css|app\.js)$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300, must-revalidate";
  }

  # Everything else: short cache
  location / {
    try_files $uri $uri/ $uri.html /index.html;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # Don't serve dotfiles
  location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
}
