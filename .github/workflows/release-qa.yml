name: Release QA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '*-beta'

jobs:
  mac-package:
    name: macOS Package Smoke
    runs-on: macos-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package macOS app
        run: pnpm qa:release:mac

      - name: Verify package outputs
        run: |
          set -euo pipefail
          test -d release/build
          ls release/build/*.dmg
          hdiutil verify release/build/*.dmg
          node -e "const p=require('./package.json'); if (!p.version) process.exit(1); console.log('version', p.version)"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: release/build
          if-no-files-found: error
