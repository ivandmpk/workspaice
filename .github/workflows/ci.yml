name: CI

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  qa:
    name: QA
    runs-on: macos-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      QA_BIOME_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run QA suite
        run: pnpm qa:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
